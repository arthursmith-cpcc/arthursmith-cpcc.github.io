<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arthur Smith's Ancient Sabertooth | ITIS3135 | Gallery</title>
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./styles/default.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Share+Tech&display=swap" rel="stylesheet">
    <style>
        #playing-cards {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 20px auto;
            background-color: #d5c3cf;
        }

        .card {
            display: flex;
            justify-content: space-between;
            height: 200px;
            width: 120px;
            border: 1px solid black;
            border-radius: 10px;
            font-size: 1.5em;
            padding: 5px;
            background-color: #ffffee;
            box-sizing: content-box;
        }

        .left {
            align-self: flex-start;
        }

        .middle {
            align-self: center;
            display: flex;
            flex-direction: column;
        }

        .right {
            align-self: flex-end;
        }

        #heart, #diamond {
            color: red;
        }
    </style>
</head>
<body>
    <div data-include="./components/header.html"></div>
    <main>
        <h2>Gallery</h2>
        <div id="playing-cards">
            <div class="card">
                <div class="left">2♠</div>
                <div class="middle">♠♠</div>
                <div class="right">♠2</div>
            </div>
            <div class="card">
                <div class="left">3♣</div>
                <div class="middle">♣♣♣</div>
                <div class="right">♣3</div>
            </div>
            <div class="card" id="heart">
                <div class="left">4♥</div>
                <div class="middle">♥♥♥♥</div>
                <div class="right">♥4</div>
            </div>
            <div class="card" id="diamond">
                <div class="left">5♦</div>
                <div class="middle">♦♦♦♦♦</div>
                <div class="right">♦5</div>
            </div>
        </div>
    </main>
    <div data-include="./components/footer.html"></div>
    <script src="./scripts/include.min.js"></script>
</body>
</html>
