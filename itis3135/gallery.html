<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arthur Smith's Ancient Sabertooth | ITIS3135 | Gallery</title>
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./styles/default.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Share+Tech&display=swap" rel="stylesheet">
    <style>
        body {
            box-sizing: border-box;
        }
        main {
            display: grid;
            grid-template-areas: 'header-two header-two logo''invitation invitation invitation''gallery gallery gallery';
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0px;
            margin-bottom: 3%;
            width: 100%;
        }
        main > img {
            background: linear-gradient(-45deg, white, #cedfcd 15%, black 50%, #d5c3cf 95%);
            grid-area: logo;
            width: 200px;
            border-radius: 15%;
        }
        h2 {
            grid-area: header-two;
            font-size: 3rem;
            display: flex;
            align-items: center;
            
        }
        main > p:first-of-type {
            grid-area: invitation;
            font-size: 1.5em;
            text-decoration: underline;
            margin-top: 0;
        }
        #photo-gallery {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
            margin: 20px auto;
            background-color: #d5c3cf;
            width: 100%;
            grid-area: gallery;
            padding-bottom: 2%;
        }

        .photo {
            display: inline-block;
            height: 120px;
            width: 200px;
            border-radius: 10%;
            background-color: #ffffee;
            box-sizing: border-box;
            
        }

        .photo > img:hover {
            transform: scale(250%);
            z-index: 3;
        }

        .photo > img {
            width: 100%;
            height: 100%;
            margin: 0;
            border-radius: 5%;
            transition: 1s ease-in-out;
            object-fit: cover;
        }

        .photo > figcaption {
            font-size: .7em;
            background-color: #d5c3cf;
            margin: 0;
            color: #331832;
        }

        @media (max-width: 750px) {
            main {
                grid-template-areas: 'header-two logo''invitation invitation''gallery gallery';
                grid-template-columns: 1fr 1fr;
            }
            .photo > img:hover {
                transform: scale(125%);
                z-index: 3;
            }
        }
    </style>
</head>
<body>
    <div data-include="./components/header.html"></div>
    <main>
        <h2>Gallery</h2>
        <img src="./images/saber-tooth.svg" alt="Sabertooth Lodge Logo">
        <p>See our lodge for yourself!</p>
        <div id="photo-gallery">
            <figure class="photo">
                <img src="./images/exterior.jpg" alt="Sabertooth Lodge Exterior">
            </figure>
            <figure class="photo">
                <img src="./images/gate-by-Luke-Shaw.jpg" alt="Sabertooth Lodge Entrance Gate">
                <figcaption><a href="https://www.geograph.org.uk/photo/7516302" target="_blank">Photo</a> &copy; Copyright <a href="https://www.geograph.org.uk/profile/129268" target="_blank">Luke Shaw</a> | <a href="http://creativecommons.org/licenses/by-sa/2.0/" target="_blank">(cc-by-sa/2.0)</a> Creative Commons License.</figcaption>
            </figure>
            <figure class="photo">
                <img src="./images/backlot-by-Marathon.jpg" alt="Sabertooth Lodge Back Lot">
                <figcaption><a href="https://www.geograph.org.uk/photo/7594554" target="_blank">Photo</a> &copy; Copyright <a href="https://www.geograph.org.uk/profile/43806" target="_blank">Marathon</a> | <a href="http://creativecommons.org/licenses/by-sa/2.0/" target="_blank">(cc-by-sa/2.0)</a> Creative Commons License.</figcaption>
            </figure>
            <figure class="photo">
                <img src="./images/stone_art.jpg" alt="Sabertooth Lodge Stone Art Installation">
                <figcaption><a href="https://www.flickr.com/photos/slrjester/289603054/" target="_blank">Photo</a> &copy; Copyright <a href="https://www.flickr.com/photos/slrjester/" target="_blank">SLR Jester</a> | <a href="https://creativecommons.org/licenses/by/2.0/deed.en" target="_blank">Creative Commons License 2.0 Generic Deed</a></figcaption>
            </figure>
            <figure class="photo">
                <img src="./images/green-hotel.jpg" alt="Sabertooth Lodge Second Exterior Shot">
                <figcaption></figcaption>
            </figure>
        </div>
    </main>
    <div data-include="./components/footer.html"></div>
    <script src="./scripts/include.min.js"></script>
</body>
</html>
