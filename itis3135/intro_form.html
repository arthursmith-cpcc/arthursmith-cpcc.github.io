<script>
// Tab Switching with SessionStorage Persistence
(function() {
    const TAB_STORAGE_KEY = 'intro_form_active_tab';

    // Switch to a specific tab
    function switchTab(tabId) {
        const tabButtons = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        
        // Remove active class from all tabs and buttons
        tabContents.forEach((tab) => {
            tab.classList.remove('active');
        });
        tabButtons.forEach((btn) => {
            btn.classList.remove('active');
        });
        
        // Add active class to selected tab and button
        const selectedTab = document.getElementById(tabId);
        const selectedBtn = document.querySelector(`[data-tab="${tabId}"]`);
        
        if (selectedTab) selectedTab.classList.add('active');
        if (selectedBtn) selectedBtn.classList.add('active');
        
        // Save to sessionStorage
        sessionStorage.setItem(TAB_STORAGE_KEY, tabId);
    }
    
    // Initialize tab state from sessionStorage
    function initializeTabs() {
        const tabButtons = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        
        // Get saved tab or default to 'form-tab'
        const savedTab = sessionStorage.getItem(TAB_STORAGE_KEY) || 'form-tab';
        
        // Hide all tabs and remove active class
        tabContents.forEach((tab) => {
            tab.classList.remove('active');
        });
        tabButtons.forEach((btn) => {
            btn.classList.remove('active');
        });
        
        // Show saved tab and activate its button
        const activeTab = document.getElementById(savedTab);
        const activeBtn = document.querySelector(`[data-tab="${savedTab}"]`);
        
        if (activeTab) activeTab.classList.add('active');
        if (activeBtn) activeBtn.classList.add('active');
    }
    
    // Add click handlers to tab buttons
    function setupTabHandlers() {
        const tabButtons = document.querySelectorAll('.tab-btn');
        
        tabButtons.forEach((btn) => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const tabId = this.getAttribute('data-tab');
                switchTab(tabId);
            });
        });
    }
    
    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            initializeTabs();
            setupTabHandlers();
        });
    } else {
        initializeTabs();
        setupTabHandlers();
    }
    
    // Expose switchTab function globally for external scripts
    window.switchToTab = switchTab;
})();
</script>
