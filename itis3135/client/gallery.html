<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Jay Media | Gallery</title>
    <link rel="stylesheet" href="./styles/default.css">
    <link rel="stylesheet" href="./styles/gallery.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    <script src="./scripts/galleryCarousel.js"></script>
</head>
<body>
    <div data-include="./components/header.html"></div>
    <main>
        <section class="gallery">
            <div class="gallery-header">
                <h1>Gallery</h1>
                <h2>From the Outdoor Landscapes Collection</h2>
                <p>Use the buttons, mouse wheel, or left/right arrows to scroll.</p>
            </div>

            <div class="gallery-view">
                <div class="cards"></div>
            </div>

            <div class="actions">
                <button class="prev" type="button">&#x25C0; Prev</button>
                <button class="next" type="button">Next &#x25B6;</button>
            </div>

            <button class="refresh-btn" type="button">Shuffle Gallery</button>
        </section>
    </main>
    <div data-include="./components/footer.html"></div>
    <script src="./scripts/galleryOverlay.js"></script>
    <script src="./scripts/include.min.js"></script>
</body>
</html>
