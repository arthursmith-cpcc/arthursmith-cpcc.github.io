		<body>
			<header>
				<h1>Professional Tennis Tours</h1>
				<nav>
					<a href="#home">Home</a> | <a href="#about">About</a> | <a href="#seasons">Seasons</a> | <a href="#sites">Sites</a> | <a href="#how">How to Watch</a> | <a href="#why">Why I Love It</a> | <a href="#ai-prompts">AI Prompts</a>
                </nav>
			</header>
			<main id="content">
				<script>
					const contentDiv = document.getElementById('content');

					function showPage(page) {
						switch (page) {
							case 'home':
								contentDiv.innerHTML =
								'<h2>Home</h2><figure><img><figcaption></figcaption></figure><p>I have been a tennis fan for longer than I can remember. Being able to witness the athleticism and skill displayed by players on the tennis court has brought me untold hours of enjoyment. I have been able to see Pete Sampras and Andre Agassi at the height of their individual successes and of their mutual rivalry. The Williams sisters grew in maturity and dominance as I watched from afar in awe. I saw Roger Federer seem invincible until Rafael Nadal came along, and then Novak Djokovic joined the fray as well. And now that these greats have moved on past their prime, I have the pleasure of seeing Jannik Sinner, Carlos Alcaraz, Aryna Sabalenka, and Iga Swiatek begin their individual and collective ascents into greatness.</p><p>On this site, you can find everything you have ever wanted to know, and maybe things you didn&apos;t know you wanted to know, about men&apos;s and women&apos;s professional tennis tours. Happy browsing! I hope you&apos;ll become as much of a fan of this sport as I am.</p>';
								break;
							case 'about':
								contentDiv.innerHTML =
								'<h2>About</h2><figure><img><figcaption></figcaption></figure><p>There are currently thousands of professional tennis players around the world; however, only the top 150 or so ranked players play in ATP or WTA events on a regular basis. The ATP and WTA are the organizations for men and women tennis players, respectively, that plan, organize, and govern the pro game and the tournaments in which the professional players participate. The players themselves are independent contractors, but they are subject to the rules and contractual obligations set by these organizations.</p><p>Both ATP and WTA tournaments are assigned various levels determined by the maximum number of points available to the tournament&apos;s winner. These levels are:</p><ul><li><strong>Majors: </strong>These are the 4 major, or "grand slam", events held each year. Each major tournament lasts 14 or 15 days. The winner of each major earns 2000 ranking points.</li><li><strong>1000s(WTA) or Masters(ATP): </strong>As the WTA designation signifies, the winner of each of these tournaments earns 1000 ranking points. There are usually around 2 of these tournaments played back-to-back during each swing of the season &mdash; that is, Middle-Eastern hard court, American Spring hard court, European clay, American Summer hard court, and Asian hard court. Tournaments at this level last between 7 and 11 days.</li><li><strong>500s: </strong>These tournaments usually play at smaller venues and have fewer main-draw participants. However, they often draw many of the higher ranked players on tour.</li><li><strong>250s: </strong>The lowest level of ATP/WTA &apos;major-league&apos; events and the smallest venues. These tournaments are great opportunities to see up-and-coming talents try to work their way up the rankings.</li></ul><p>There are other professional tours, such as Challenger, ITF, and WTA 125, that put on tournaments at tennis clubs around the world in which players outside the top 150 regularly play. Ascension from these levels into the ATP/WTA tournaments can be difficult, but it can be done. One such player from Canada, Victoria Mboko, began 2025 with a ranking outside the top 300 but is now in the top 10.</p>';
								break;
							case 'seasons':
								contentDiv.innerHTML =
								'<h2>Seasons</h2><figure><img><figcaption></figcaption></figure><p>Over 30 years ago, at a time when I only had access to the 4 major tennis tournaments &mdash; the Australian Open, the French Open, The Championships at Wimbledon, and the U.S. Open &mdash; I missed the game terribly in the weeks and months that intervened between them. Now, through various media offerings, there are multiple tournaments available for viewing most weeks between mid-January and mid-November.</p><p>Tennis is played on three surfaces &mdash; hard court, clay, and grass. For the most part, tournaments that share a surface type are grouped into specific portions of the season. Below is a table showing court types, areas of the world, and the months during the season when events are played on that surface:</p><table><thead><tr><td>Time of Year</td><td>Area of the World</td><td>Surface</td></tr></thead><tbody><tr><td>January</td><td>Australia</td><td>Hard Court</td></tr><tr><td>February</td><td>Middle East</td><td>Hard Court</td></tr><tr><td>March</td><td>United States</td><td>Hard Court</td></tr><tr><td>April - June</td><td>Europe</td><td>Clay</td></tr><tr><td>June - July</td><td>England</td><td>Grass</td></tr><tr><td>August - September</td><td>North America</td><td>Hard Court</td></tr><tr><td>October</td><td>China</td><td>Hard Court</td></tr></tbody></table><p>Year-end finals are played in November. The men&apos;s ATP Final is played in Turin, Italy, and the women&apos;s WTA Final is in Riyadh, Saudi Arabia. Both are played on indoor hard courts.</p><p>Most players will enter 15 to 20 tournaments a year. In addition to this, there are world team tournaments each year with progressive rounds scheduled throughout the season. After a brief 6-week offseason, it all begins again in January.</p>';
								break;
							case 'sites':
								contentDiv.innerHTML =
								'<h2>Sites</h2><figure><img><figcaption></figcaption></figure><p>Professional tennis players live much of their lives on the road. While sections of the season tend to be grouped in specific areas of the world, each tournament is held in a different city. Players will often vie for a title in the tournament&apos;s final round on a Saturday or Sunday, then travel to a new city to begin another event on Monday or Tuesday of the very next week.</p><p>The following major and 1000 level tournaments, along with their respective cities, are listed in the order in which they take place during the season.</p><table><thead><tr><td>Tournament</td><td>Tour</td><td>City</td></tr></thead><tbody><tr><td>Australian Open</td><td>ATP & WTA</td><td>Melbourne, Australia</td></tr><tr><td>Qatar TotalEnergies Open</td><td>WTA</td><td>Doha, Qatar</td></tr><tr><td>Dubai Duty Free Tennis Championships</td><td>WTA</td><td>Dubai, U.A.E.</td></tr><tr><td>BNP Paribas Open</td><td>ATP & WTA</td><td>Indian Wells, United States</td></tr><tr><td>Miami Open</td><td>ATP & WTA</td><td>Miami, United States</td></tr><tr><td>Rolex Monte-Carlo Masters</td><td>ATP</td><td>Monte-Carlo, Monaco</td></tr><tr><td>Mutua Madrid Open</td><td>ATP & WTA</td><td>Madrid, Spain</td></tr><tr><td>Internazionali BNL d&apos;Italia</td><td>ATP & WTA</td><td>Rome, Italy</td></tr><tr><td>French Open</td><td>ATP & WTA</td><td>Paris, France</td></tr><tr><td>The Championships, Wimbledon</td><td>ATP & WTA</td><td>London, England</td></tr><tr><td>National Bank Open</td><td>ATP</td><td>Montreal or Toronto, Canada (alternates each year)</td></tr><tr><td>National Bank Open</td><td>WTA</td><td>Toronto or Montreal, Canada (alternates each year)</td></tr><tr><td>Cincinnatti Open</td><td>ATP & WTA</td><td>Cincinnati, United States</td></tr><tr><td>US Open</td><td>ATP & WTA</td><td>New York, United States</td></tr><tr><td>China Open</td><td>WTA</td><td>Beijing, China</td></tr><tr><td>Rolex Shanghai Masters</td><td>ATP</td><td>Shanghai, China</td></tr><tr><td>Wuhan Open</td><td>WTA</td><td>Wuhan, China</td></tr><tr><td>Rolex Paris Masters</td><td>ATP</td><td>Paris, France</td></tr></tbody></table>';
								break;
							case 'how':
								contentDiv.innerHTML =
								'<h2>How to Follow</h2><p>The fragmented licensing involved in the airing of tennis events can make following the sport a bit of a headache. Availability of content will vary from country to country. Things have improved greatly in the age of online streaming. However, there is often a lack of diversity in viewing options. So, if you dislike a certain media outlet&apos;s presentation or their commentary style, your only choice may be between accepting those aspects of the broadcast you don&apos;t like or just not watching the sport at all.</p><p>Here in the United States, the Tennis Channel&apos;s TC Plus streaming service offers the most comprehensive coverage of the tennis season. The package includes access to the Tennis Channel and the TC2 channel, along with live airing and replays of all matches from 1000 and 500 level ATP and WTA tournament events and each tour&apos;s year-end final events. Some 250 and Challenger level tournament coverage is also included, as well as coverage of world team competitions like Davis Cup and Billie Jean King Cup. Although TC Plus used to own rights to air the French Open major, currently none of the majors are available on the service.</p><p>The French Open is now aired on Turner broadcast stations. Since Turner&apos;s parent company is Warner Brothers, matches from the major can also be streamed on HBO Max. As for the other majors, ESPN owns broadcast rights to the Australian Open, Wimbledon, and the US Open.</p><p>If you&apos;re interested in some of the lower level matches in the women&apos;s game, the WTA has a free offering that allows access to WTA 125 matches through the WTA website.</p><p>Another way to engage with the sport and get some behind-the-scenes insights from journalists and players is the ever expanding podcast space. These podcasts provide post-tournament commentary, news about off-court issues affecting players and the sport as a whole, and interviews with current and former players, coaches, and commentators. A few of my favorites are linked below.</p><div id="podcast-links"><figure><img><figcaption></figcaption></figure><figure><img><figcaption></figcaption></figure><figure><img><figcaption></figcaption></figure></div>';
								break;
							case 'why':
								contentDiv.innerHTML =
								'<h2>Why I Love It</h2><figure><img><figcaption></figcaption></figure><p>Some people might look at this game and just see two people hitting a ball back and forth over a net for an hour or two. The scoring is confusing, the grunts are annoying, and the ball flight can be hard to follow. For me, professional tennis is about much more than the action you see on the court. It is about the individual player, who likely began their traning when they were not much larger than the tennis racket in their hands. It is about how this person balances the dedication required to complete at the professional level and become one of the 150 or so highest ranked tennis players in the world with the challenge of becoming an intelligent, well-rounded adult. It is about the seemingly small differences in style, shot mastery, stamina, and natural ability that separate the number 10 player from the 100th ranked player, and the sometimes surprising improvements made by a player in one or more of these areas that send them rocketing up the rankings.</p><p>Tennis is the joy on Carlos Alcaraz&apos;s face after he hits a running forehand winner that most of us could never dream of. It is the mechanical precision of Novak Djokovic or the balet-like elegance of Roger Federer in their primes. It is the love and respect shared between the Williams sisters that never faltered even when they faced each other in multiple major tournament finals. It is a whirlwind fortnight that ended with Emma Raducanu, who started the tournament with a world ranking of 150, being crowned the women&apos;s US Open Champion. Tennis is the barrier breaking greatness of Arthur Ashe and Althea Gibson.</p><p>It&apos;s also the heartbreak of seeing Bianca Andrescu&apos;s and Grigor Dmitrov&apos;s promising careers face constant setbacks after multiple injuries. It&apos;s suffering along with Ons Jabeur, the aptly nicknamed "Minister of Happiness," as she bears the weight of an entire region after disappointing performances dash her hopes of becoming the first major champion from an Arab nation but then hearing the joy in her voice a year later as she talks about her decision to take a break from the sport and start a family with her ever supportive husband. Tennis is seeing people from around the world come together, work out their differences on and off the court, and make something great.</p><p>This sport is about the potential individual and collective greatness in all of us. It is perseverence and giving your best even when facing the knowledge that your best won&apos;t win out over someone else&apos;s. But it&apos;s also the belief that, with the right preparation, you may, for a brief life-altering moment, reach levels of success beyond your wildest imagination.</p>';
								break;
							case 'ai-prompts':
								contentDiv.innerHTML =
								'<h2>AI Prompts</h2><p>No AI was used in the creation of this site.</p>';
								break;
							default:
								contentDiv.innerHTML = '<h2>404 - Page Not Found</h2>';
						}
					}

					window.addEventListener('hashchange', () => {
						const page = window.location.hash.slice(1);
						showPage(page);
					});

					const initialPage = window.location.hash.slice(1) || 'home';
					showPage(initialPage);
				</script>
			</main>
